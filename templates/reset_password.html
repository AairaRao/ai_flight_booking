{% extends "base.html" %}

{% block title %}Reset Password - SkyVoyage{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="icon-header">
            <i class="fas fa-key"></i>
        </div>
        <h2>Reset Password</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 10px;">
            Account: <strong>{{ email }}</strong>
        </p>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">
            Enter your new password below
        </p>
        <form method="POST">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="Enter new password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required minlength="6">
            </div>
            <button type="submit">
                <i class="fas fa-check"></i> Reset Password
            </button>
        </form>
        <div class="links">
            <a href="{{ url_for('login') }}">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>

<style>
    .icon-header {
        text-align: center;
        margin-bottom: 20px;
    }
    .icon-header i {
        font-size: 48px;
        color: var(--accent);
        background: linear-gradient(135deg, #E7F1FF, #D0E4FF);
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
</style>
{% endblock %}
