{% extends "base.html" %}

{% block title %}Login - SkyVoyage{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <h2>Welcome Back</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">Sign in to your SkyVoyage account</p>
        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <div class="links">
            <a href="{{ url_for('forgot_password') }}" class="forgot-link">
                <i class="fas fa-key"></i> Forgot Password?
            </a>
            <a href="{{ url_for('signup') }}">Don't have an account? Sign Up</a>
        </div>
    </div>
</div>

<style>
    .forgot-link {
        display: block;
        text-align: center;
        margin-bottom: 15px;
        color: var(--accent);
        font-size: 14px;
    }
    .forgot-link:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
